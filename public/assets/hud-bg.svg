<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">

<defs>

<radialGradient id="bgGlow" cx="50%" cy="0%" r="80%">
<stop offset="0%" stop-color="#1c6b6f"></stop>
<stop offset="40%" stop-color="#0c3a40"></stop>
<stop offset="100%" stop-color="#02161f"></stop>
</radialGradient>

<linearGradient id="lineGlow" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="transparent"></stop>
<stop offset="50%" stop-color="#3df5c7"></stop>
<stop offset="100%" stop-color="transparent"></stop>
</linearGradient>

</defs>

<!-- main background -->
<rect width="1920" height="1080" fill="url(#bgGlow)"></rect>

<!-- top glow bar -->
<rect x="0" y="80" width="1920" height="2" fill="url(#lineGlow)" opacity="0.4"></rect>

<!-- center HUD divider -->
<rect x="958" y="200" width="4" height="680" fill="#1ee6b8" opacity="0.15"></rect>

<!-- decorative lines -->
<rect x="100" y="200" width="400" height="2" fill="#1ee6b8" opacity="0.15"></rect>
<rect x="1420" y="200" width="400" height="2" fill="#1ee6b8" opacity="0.15"></rect>

<rect x="100" y="900" width="400" height="2" fill="#1ee6b8" opacity="0.15"></rect>
<rect x="1420" y="900" width="400" height="2" fill="#1ee6b8" opacity="0.15"></rect>

</svg>