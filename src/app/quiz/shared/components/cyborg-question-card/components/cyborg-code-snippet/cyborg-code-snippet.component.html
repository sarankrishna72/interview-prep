<section class="relative z-[1] mb-5 cyborg-code-frame">
  <div class="cyborg-code-header">
    <cyborg-text [textConfig]="{size: 'xs', color: 'accent', family: 'orbitron'}">Code</cyborg-text>
  </div>
  <div class="cyborg-code-block flex items-center">
    <!-- Code content start here -->
     <pre><code [textContent]="codeSnippet()"></code></pre>
    <!-- Code content end here -->

  </div>
</section>
