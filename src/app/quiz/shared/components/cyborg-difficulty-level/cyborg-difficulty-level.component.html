<div class="difficulty-section">
  <div class="difficulty-selector">
    @for (item of difficulties; track item) {
      <input (change)="onChange(item)" type="radio" name="difficulty" [id]="item" [checked]="selectedDifficulty == item" />
      <label [for]="item" class="difficulty-option flex items-center cyber-btn" [ngClass]="item">
        <span class="difficulty-dot"></span>
        <span class="difficulty-text capitalize">{{item}}</span>
      </label>
    }
  </div>
</div>
