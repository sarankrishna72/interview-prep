<div class="particles">
  <div
    class="particle"
    *ngFor="let p of particles; let i = index"
    [style.left.%]="(i * 3.1) % 100"
    [style.width.px]="2 + (i % 5)"
    [style.height.px]="2 + (i % 5)"
    [style.animationDuration.s]="12 + (i % 9)"
    [style.animationDelay.s]="(i % 7) * 0.7"
  ></div>
</div>
